<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Jobs</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #f3f4f6;
}

/* Layout */
.container {
    display: flex;
    padding: 20px;
}

/* Sidebar Filters */
.sidebar {
    width: 250px;
    background: white;
    padding: 20px;
    border-radius: 10px;
    height: fit-content;
}

.sidebar h3 {
    margin-bottom: 10px;
}

.sidebar label {
    display: block;
    margin: 8px 0;
}

/* Job List */
.job-list {
    flex: 1;
    margin-left: 20px;
}

/* Job Card */
.job-card {
    background: white;
    padding: 20px;
    border-radius: 10px;
    margin-bottom: 15px;
    transition: 0.3s;
    border: 1px solid #ddd;
}

.job-card:hover {
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

.job-header {
    display: flex;
    justify-content: space-between;
}

.job-title {
    font-size: 18px;
    font-weight: bold;
}

.company {
    color: gray;
}

.tags span {
    background: #e0f2fe;
    color: #0284c7;
    padding: 5px 10px;
    margin: 5px;
    border-radius: 5px;
    display: inline-block;
}

.apply-btn {
    background: #0d6efd;
    color: white;
    border: none;
    padding: 8px 15px;
    cursor: pointer;
    border-radius: 5px;
}

.apply-btn:hover {
    background: #0b5ed7;
}
</style>

</head>

<body>

<div class="container">

    <!-- 🔹 Sidebar Filters -->
    <div class="sidebar">
        <h3>Filters</h3>

        <h4>Location</h4>
        <label><input type="checkbox"> Delhi</label>
        <label><input type="checkbox"> Noida</label>
        <label><input type="checkbox"> Bangalore</label>

        <h4>Experience</h4>
        <label><input type="checkbox"> Fresher</label>
        <label><input type="checkbox"> 1-3 Years</label>
        <label><input type="checkbox"> 3+ Years</label>

        <h4>Salary</h4>
        <label><input type="checkbox"> 3-5 LPA</label>
        <label><input type="checkbox"> 5-10 LPA</label>
    </div>

    <!-- 🔹 Job List -->
    <div class="job-list">

        <div class="job-card">
            <div class="job-header">
                <div>
                    <div class="job-title">Frontend Developer</div>
                    <div class="company">TCS</div>
                </div>
                <button class="apply-btn">Apply</button>
            </div>

            <p>Location: Noida | Experience: 1-3 Years</p>

            <div class="tags">
                <span>HTML</span>
                <span>CSS</span>
                <span>JavaScript</span>
            </div>
        </div>

        <div class="job-card">
            <div class="job-header">
                <div>
                    <div class="job-title">Backend Developer</div>
                    <div class="company">Infosys</div>
                </div>
                <button class="apply-btn">Apply</button>
            </div>

            <p>Location: Bangalore | Experience: 2 Years</p>

            <div class="tags">
                <span>Node.js</span>
                <span>MongoDB</span>
                <span>API</span>
            </div>
        </div>

        <div class="job-card">
            <div class="job-header">
                <div>
                    <div class="job-title">Full Stack Developer</div>
                    <div class="company">Wipro</div>
                </div>
                <button class="apply-btn">Apply</button>
            </div>

            <p>Location: Delhi | Experience: Fresher</p>

            <div class="tags">
                <span>React</span>
                <span>Node</span>
                <span>MongoDB</span>
            </div>
        </div>

    </div>

</div>

</body>
</html>
